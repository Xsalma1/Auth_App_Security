<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member Area | SecureAuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="bg-slate-800 max-w-lg w-full rounded-[40px] p-10 border-4 border-emerald-500/30 text-center shadow-2xl">
        <div class="w-24 h-24 bg-emerald-500 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl shadow-lg shadow-emerald-500/20">👤</div>
        <h1 class="text-3xl font-black mb-2">Authenticated Member</h1>
        <p class="text-slate-400 text-sm mb-8 italic">Verified Session • Access Level: Standard</p>
        
        <div class="bg-slate-900/50 rounded-2xl p-6 text-left border border-slate-700 mb-8">
            <h4 class="text-emerald-400 font-bold text-xs uppercase mb-3 tracking-widest">Exclusive Tips</h4>
            <ul class="text-sm space-y-2 text-slate-300">
                <li class="flex gap-2">✔ Always keep your 2FA enabled.</li>
                <li class="flex gap-2">✔ Rotate your JWT keys periodically.</li>
                <li class="flex gap-2">✔ Avoid using public Wi-Fi for login.</li>
            </ul>
        </div>
        <button onclick="window.location.href='/dashboard'" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black shadow-xl transition-all active:scale-95">Back to Dashboard</button>
    </div>
</body>
</html>
