<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Panel | SecureAuth System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div id="content" class="hidden glass-card p-8 rounded-3xl shadow-2xl w-full max-w-2xl text-center border-2 border-indigo-500">
        <h1 class="text-3xl font-bold text-indigo-400 mb-4">Manager Control Center</h1>
        <p class="text-gray-300 mb-6">Welcome! This section is restricted to <b>Managers</b> and <b>Admins</b>.</p>
        <div class="bg-slate-900/50 p-4 rounded-xl text-left font-mono text-sm text-indigo-300 border border-indigo-900/30">
            > Status: Authorized <br>
            > Role: Managerial Access Granted <br>
            > Action: Monitoring System Logs...
        </div>
        <button onclick="window.location.href='/dashboard.html'" class="mt-8 bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-lg font-bold transition">Back to Dashboard</button>
    </div>

    <div id="error" class="hidden text-center">
        <h1 class="text-8xl font-black text-red-600 mb-4 opacity-20">403</h1>
        <h2 class="text-2xl font-bold mb-2">Access Denied!</h2>
        <p class="text-gray-400 mb-6">Your current role does not have permission to view the Manager Panel.</p>
        <button onclick="window.location.href='/dashboard.html'" class="bg-slate-800 hover:bg-slate-700 px-6 py-2 rounded-lg font-bold transition border border-slate-700">Return to Dashboard</button>
    </div>

    <script>
        async function checkManagerAccess() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }

            const res = await fetch('/api/manager', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                document.getElementById('content').classList.remove('hidden');
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }
        checkManagerAccess();
    </script>
</body>
</html>
