<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Center | SecureAuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white p-8">
    <div id="content" class="hidden max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-indigo-400 mb-8 border-b border-indigo-500/20 pb-4 italic">Management Analytics</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Traffic Growth</h3>
                <div class="flex items-end gap-2 h-32">
                    <div class="bg-indigo-500 w-full rounded-t" style="height: 40%"></div>
                    <div class="bg-indigo-400 w-full rounded-t" style="height: 70%"></div>
                    <div class="bg-indigo-600 w-full rounded-t" style="height: 95%"></div>
                    <div class="bg-indigo-300 w-full rounded-t" style="height: 55%"></div>
                </div>
            </div>
            
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Pending Approvals</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-slate-900 p-3 rounded-xl border border-slate-700">
                        <span class="text-xs font-bold">New Project Launch</span>
                        <span class="bg-amber-500/20 text-amber-500 text-[10px] px-2 py-1 rounded">PENDING</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-900 p-3 rounded-xl border border-slate-700">
                        <span class="text-xs font-bold">User Upgrade Req #82</span>
                        <span class="bg-emerald-500/20 text-emerald-500 text-[10px] px-2 py-1 rounded">REVIEWED</span>
                    </div>
                </div>
            </div>
        </div>
        <button onclick="window.location.href='/dashboard'" class="text-slate-500 hover:text-indigo-400 underline transition">← Back to Hub</button>
    </div>

    <script>
        async function checkManager() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/manager', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) document.getElementById('content').classList.remove('hidden');
            else document.body.innerHTML = '<div class="text-center mt-20"><h1 class="text-6xl font-bold text-red-500">403</h1><p class="text-slate-400">Access Restricted to Management</p></div>';
        }
        checkManager();
    </script>
</body>
</html>
