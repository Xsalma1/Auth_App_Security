<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | SecureAuth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen">
    <div id="content" class="hidden bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-2xl text-center border-2 border-red-500">
        <h1 class="text-3xl font-bold text-red-500 mb-4">Admin Control Center</h1>
        <p class="text-gray-300 mb-6">This area is restricted. Only users with the <b>Admin</b> role can see this.</p>
        <div class="bg-slate-700 p-4 rounded text-left font-mono text-sm">
            > Access Granted: User Role Verified <br>
            > System Status: Optimal <br>
            > Security Protocols: Active
        </div>
        <button onclick="window.location.href='/dashboard.html'" class="mt-6 text-indigo-400 underline">Back to Dashboard</button>
    </div>

    <div id="error" class="hidden text-center">
        <h1 class="text-6xl font-bold text-red-600 mb-4">403</h1>
        <p class="text-2xl">Access Denied!</p>
        <p class="text-gray-400">You don't have the permissions to view this page.</p>
        <button onclick="window.location.href='/dashboard.html'" class="mt-6 bg-indigo-600 p-3 rounded-lg">Return to Dashboard</button>
    </div>

    <script>
        async function checkAdmin() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/admin', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                document.getElementById('content').classList.remove('hidden');
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }
        checkAdmin();
    </script>
</body>
</html>
